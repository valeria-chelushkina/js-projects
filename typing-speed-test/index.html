<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Typing speed test</title>
  </head>
  <body>
    <div class="container">
      <header>
        <div>Typing speed test</div>
        <div>Personal best result</div>
      </header>
      <main>
        <div class="upper-block">
          <div class="stats-block">
            <div class="wpm">
              <p>WPM: <span id="cur-wpm"></span></p>
            </div>
            <div class="accuracy">
              <p>Accuracy: <span id="cur-accuracy"></span></p>
            </div>
            <div class="time">
              <p>Time: <span id="cur-time"></span></p>
            </div>
          </div>
          <div class="difficulties-block">
            <p>Difficulties:</p>
            <button id="easy">Easy</button>
            <button id="medium">Medium</button>
            <button id="hard">Hard</button>
          </div>
          <div class="modes-block">
            <button class="timed-mode" data-time="60">Timed (60s)</button>
            <button class="timed-mode" data-time="30">Timed (30s)</button>
            <button class="timed-mode" data-time="120">Timed (120s)</button>
            <button>Passage</button>
          </div>
        </div>

        <div class="main-text-block">
          <div id="words"></div>
        </div>
      </main>

      <div class="result-card">
        
      </div>

    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
